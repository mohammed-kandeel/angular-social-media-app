@if (isOpen) {
  <div class="animate-fadeIn fixed inset-0 z-50 flex items-center justify-center bg-black/40">
    <div class="animate-scaleIn w-96 rounded-2xl bg-white p-6 text-center shadow-xl">
      <!-- icon -->
      <div class="mb-4">
        @if (type === 'success') {
          <div
            class="mx-auto flex h-16 w-16 items-center justify-center rounded-full bg-green-100 text-3xl text-green-600"
          >
            ✓
          </div>
        }

        @if (type === 'error') {
          <div
            class="mx-auto flex h-16 w-16 items-center justify-center rounded-full bg-red-100 text-3xl text-red-600"
          >
            ✕
          </div>
        }
      </div>

      <h2 class="mb-2 text-xl font-bold">{{ title }}</h2>

      <p class="text-gray-500">{{ message }}</p>
    </div>
  </div>
}
