<section
  class="bg-neutral-primary-soft border-default rounded-base mb-4 grid w-full animate-pulse gap-4 border p-6 pb-4 shadow-xs"
>
  <!-- Header: Profile + Name + Meta -->
  <div class="flex justify-between">
    <div class="flex items-center gap-2">
      <div class="h-11 w-11 rounded-full bg-gray-300"></div>
      <!-- profile pic skeleton -->
      <div class="ms-2 min-w-0 flex-1 space-y-2">
        <div class="h-4 w-32 rounded bg-gray-300"></div>
        <!-- name -->
        <div class="flex items-center gap-2 text-[12px]">
          <div class="h-3 w-16 rounded bg-gray-200"></div>
          <!-- username -->
          <div class="h-3 w-4 rounded-full bg-gray-200"></div>
          <!-- dot -->
          <div class="h-3 w-8 rounded bg-gray-200"></div>
          <!-- time -->
          <div class="h-3 w-4 rounded-full bg-gray-200"></div>
          <!-- dot -->
          <div class="h-4 w-20 rounded-full bg-gray-200"></div>
          <!-- visibility -->
        </div>
      </div>
    </div>

    <div class="h-8 w-8 rounded-full bg-gray-300"></div>
    <!-- options button -->
  </div>

  <!-- Post content -->
  <div class="space-y-2">
    <div class="h-4 w-full rounded bg-gray-200"></div>
    <div class="h-4 w-5/6 rounded bg-gray-200"></div>
  </div>

  <!-- Post image -->
  <div class="rounded-base h-60 bg-gray-200"></div>

  <!-- Footer: likes/comments/shares -->
  <div class="space-y-3 border-t border-gray-300 pt-4">
    <div class="flex items-center justify-between">
      <div class="h-5 w-16 rounded bg-gray-200"></div>
      <!-- likes -->
      <div class="flex gap-2">
        <div class="h-5 w-12 rounded bg-gray-200"></div>
        <!-- shares -->
        <div class="h-5 w-12 rounded bg-gray-200"></div>
        <!-- comments -->
        <div class="h-5 w-20 rounded bg-gray-200"></div>
        <!-- view details -->
      </div>
    </div>

    <div class="flex gap-4">
      <div class="h-8 flex-1 rounded bg-gray-200"></div>
      <!-- like button -->
      <div class="h-8 flex-1 rounded bg-gray-200"></div>
      <!-- comment button -->
      <div class="h-8 flex-1 rounded bg-gray-200"></div>
      <!-- share button -->
    </div>
  </div>
</section>
