<div
  (click)="onBgModal($event)"
  class="fixed inset-0 z-50 flex items-center justify-center bg-black/70"
>
  <div #modal class="w-full max-w-lg overflow-hidden rounded-3xl bg-gray-100 duration-300">
    <!-- Header -->
    <div class="flex items-center justify-between px-6 py-4 border-b border-gray-100">
      <div class="flex items-center gap-2.5">
        <i class="fa-solid fa-users text-blue-500"></i>
        <h2 class="text-base font-bold text-gray-900">People who reacted</h2>
      </div>
      <button
        (click)="onCloseModal($event)"
        class="w-8 h-8 flex items-center justify-center rounded-full hover:bg-gray-100 transition text-gray-400 hover:text-gray-600"
      >
        <i class="fa-solid fa-xmark"></i>
      </button>
    </div>

    <!-- List -->
    <div
      infiniteScroll
      [infiniteScrollDistance]="1"
      [infiniteScrollThrottle]="150"
      [scrollWindow]="false"
      (scrolled)="onScroll()"
      class="px-4 py-3 space-y-1 max-h-90 overflow-y-auto"
    >
      @for (user of reactedUsers; track user.id) {
        <a
          [routerLink]="['/profile/', user._id]"
          class="flex items-center gap-3 px-3 py-3 rounded-2xl hover:bg-blue-50 transition cursor-pointer"
        >
          <img [src]="user.photo" class="w-11 h-11 rounded-full object-cover shrink-0" />
          <div class="min-w-0">
            <p class="text-sm font-bold text-gray-900 truncate">{{ user.name }}</p>
            <p class="text-xs text-gray-400 truncate">@{{ user.username }}</p>
          </div>
        </a>
      }
    </div>

    @if (isLoading || isLoadingMore) {
      <div class="text-center text-gray-400 px-3 py-3">
        loading <i class="fa-solid fa-spinner fa-spin ms-1"></i>
      </div>
    }
  </div>
</div>
