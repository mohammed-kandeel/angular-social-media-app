<div class="border-gray-300 pt-4">
  <div
    class="mb-3 flex items-center justify-between border-b border-gray-300 pb-3 text-[14px] font-semibold text-gray-400"
  >
    <button (click)="onShowReactedModal()" class="group/like flex cursor-pointer justify-center">
      <span
        class="me-1 inline-flex h-5 w-5 items-center justify-center rounded-full bg-blue-500 text-[11px] text-white"
      >
        <i class="fa-regular fa-thumbs-up"></i>
      </span>
      <span
        class="transition-all duration-150 group-hover/like:text-blue-500 group-hover/like:underline group-hover/like:underline-offset-3"
        >{{ post.likesCount }} {{ post.likesCount === 1 ? 'like' : 'likes' }}</span
      >
    </button>

    <div class="flex items-center gap-2">
      <p>
        <i class="fa-solid fa-retweet me-1"></i> {{ post.sharesCount }}
        {{ post.sharesCount === 1 ? 'share' : 'shares' }}
      </p>

      <p>{{ post.commentsCount }} {{ post.commentsCount === 1 ? 'comment' : 'comments' }}</p>
      <a
        [routerLink]="['/posts', post._id]"
        class="cursor-pointer rounded-md px-2 py-1 text-blue-600 hover:bg-blue-100"
      >
        view details
      </a>
    </div>
  </div>

  <div class="flex items-center justify-between gap-4 px-2 font-semibold text-gray-600">
    <button
      (click)="onToggleLike()"
      [class]="isLike ? 'bg-blue-100! text-blue-500' : ''"
      class="w-full rounded-md px-3 py-2 capitalize transition duration-200 hover:bg-gray-200"
    >
      <i class="fa-regular fa-thumbs-up"></i> like
    </button>

    <button
      (click)="onToggleComments()"
      class="w-full rounded-md px-3 py-2 capitalize transition duration-200 hover:bg-gray-200"
    >
      <i class="fa-regular fa-comment"></i> comment
    </button>

    <button
      #share
      (click)="onSharePoste()"
      class="w-full rounded-md px-3 py-2 capitalize transition duration-200 hover:bg-gray-200"
    >
      <i class="fa-solid fa-share-nodes"></i> share
    </button>
  </div>
</div>

@if (toggleModal) {
  @defer (when toggleModal) {
    <app-share-post-modal [post]="post" (modalEvent)="modalEvent($event)" />
  }
}

@if (isShowReactedModal) {
  <app-post-people-who-reacted-modal [postId]="post._id" (onCloseModel)="onCloseReactedModal()" />
}
