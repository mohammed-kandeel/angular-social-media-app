<section class="grid gap-4 px-4">
  <div class="flex gap-3">
    <div class="shrink-0 self-start">
      <img
        class="h-10 w-10 rounded-full border border-gray-200"
        [src]="user.photo"
        [alt]="user.name"
      />
    </div>

    <div class="relative flex-1">
      <textarea
        (input)="onTextInput()"
        [formControl]="textareaInput"
        id="message"
        rows="3"
        [placeholder]="placeholder"
        class="border-default-medium text-heading rounded-base placeholder:text-body block w-full resize-none border bg-gray-50 p-3.5 pb-13 text-sm shadow-xs focus:border focus:ring-blue-300"
      ></textarea>

      <div class="absolute inset-x-0 right-2 bottom-4 flex justify-between px-3">
        <div class="flex">
          <label
            (change)="onGetImage($event)"
            class="flex cursor-pointer items-center gap-1 rounded-full px-3 text-sm text-[14px] font-semibold text-gray-400 transition duration-200 hover:bg-gray-100"
            [for]="`file_input_comment${post_comment_ID}`"
          >
            <i class="fa-solid fa-image text-[18px]"></i>
            <input class="hidden" [id]="`file_input_comment${post_comment_ID}`" type="file" />
          </label>

          <app-emoji-btn
            [amojiClass]="'text-gray-400  text-[18px]  '"
            (selectedAmoji)="addEmoji($event)"
            [closeAmoji]="closeAmoji"
          />
        </div>

        <button
          (click)="onPost()"
          [disabled]="!isValid || isLoadingInput"
          class="hover:bg-brand-strong focus:ring-brand-medium box-border flex h-9 w-9 cursor-pointer items-center justify-center rounded-full border border-transparent bg-blue-500 text-sm leading-5 font-medium text-white shadow-xs focus:ring-2 focus:outline-none disabled:cursor-not-allowed! disabled:bg-blue-300"
        >
          @if (isLoadingInput) {
            <i class="fa-solid fa-spinner fa-spin"></i>
          } @else {
            <i class="fa-regular fa-paper-plane"></i>
          }
        </button>
      </div>
    </div>
  </div>

  @if (image) {
    <div class="rounded-base relative overflow-hidden">
      <img [src]="image" class="h-60 w-full object-cover object-top" alt="" />
      <button
        title="remove image"
        (click)="onRemoveImage()"
        class="absolute inset-e-3 top-3 flex h-5 w-5 cursor-pointer items-center justify-center rounded-full bg-black/60 text-[12px] text-white transition hover:bg-black/70"
      >
        <i class="fa-solid fa-xmark"></i>
      </button>
    </div>
  }
</section>
