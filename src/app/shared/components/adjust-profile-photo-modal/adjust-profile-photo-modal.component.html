<div class="fixed inset-0 bg-black/50 backdrop-blur-sm z-50 flex items-center justify-center p-4">
  <div class="bg-white rounded-3xl shadow-2xl w-full max-w-lg p-6 space-y-5">
    <!-- title -->
    <div>
      <h2 class="text-lg font-bold text-gray-900">Adjust profile photo</h2>
      <p class="text-sm text-gray-400 mt-0.5">
        Drag to reposition and use zoom for perfect framing.
      </p>
    </div>

    <!-- Cropper -->
    <div class="flex justify-center max-h-80">
      <image-cropper
        [imageFile]="file"
        [maintainAspectRatio]="true"
        [aspectRatio]="1 / 1"
        [roundCropper]="true"
        [imageQuality]="100"
        [transform]="{ scale: zoom }"
        [allowMoveImage]="true"
        (imageCropped)="imageCropped($event)"
      />
    </div>

    <!-- Zoom Input -->
    <div class="space-y-2">
      <div class="flex items-center justify-between text-sm font-medium">
        <span class="text-blue-500">Zoom</span>
        <span class="text-gray-500">{{ zoom }}x</span>
      </div>
      <input
        #range
        type="range"
        min="1"
        max="3"
        step="0.01"
        class="w-full h-1.5 accent-blue-500 cursor-pointer"
        [value]="zoom"
        (input)="onZoomChange(+range.value)"
      />
    </div>

    <!-- Privacy -->
    <div class="space-y-2">
      <label class="text-xs font-bold text-gray-500 uppercase tracking-widest">Post Privacy</label>
      <select
        [formControl]="privacyInput"
        class="w-full border border-gray-200 rounded-xl px-4 py-3 text-sm text-gray-700 focus:outline-none focus:ring-2 focus:ring-blue-500 bg-white"
      >
        <option value="public">Public</option>
        <option value="followers">Followers</option>
        <option value="only_me">Only me</option>
      </select>
    </div>

    <!-- Actions -->
    <div class="flex items-center justify-end gap-3 pt-1">
      <button
        (click)="cancelClick()"
        class="px-5 py-2.5 text-sm font-semibold text-gray-600 border border-gray-200 rounded-xl hover:bg-gray-50 transition"
      >
        Cancel
      </button>
      <button
        (click)="saveClick()"
        class="px-5 py-2.5 text-sm font-semibold text-white bg-blue-600 hover:bg-blue-700 rounded-xl transition"
      >
        Save photo
      </button>
    </div>
  </div>
</div>
