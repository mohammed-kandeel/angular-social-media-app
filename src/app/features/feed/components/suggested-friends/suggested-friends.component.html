<button
  (click)="toggleSuggestedFriends()"
  class="bg-neutral-primary-soft border-default mt-1 mb-3 w-full cursor-pointer rounded-full border p-1 shadow-xs sm:p-2 md:hidden md:max-w-sm"
>
  <div
    class="bg-neutral-secondary-medium hover:bg-neutral-tertiary-medium flex items-center justify-between rounded-full px-3 py-1 capitalize transition"
  >
    <span class="font-bold text-black">
      <i class="fa-solid fa-users me-1 text-[.875rem] text-blue-500"></i> Suggested Friends</span
    >
    <div class="flex items-center gap-2 text-[.875rem] font-bold text-blue-500">
      <span
        class="flex h-5.5 w-5.5 items-center justify-center rounded-full bg-gray-200 text-gray-600"
      >
        {{ suggestedFriends.length }}</span
      >
      @if (isOpen) {
        hide
      } @else {
        show
      }
    </div>
  </div>
</button>

<aside
  [class.hidden]="!isOpen"
  class="bg-neutral-primary-soft border-default rounded-base divide-default border p-6 shadow-xs"
>
  <div>
    <div class="flex items-center justify-between pb-4">
      <h5 class="text-[1.125rem] leading-none font-bold text-nowrap text-black">
        <i class="fa-solid fa-users me-1 text-[.875rem] text-blue-500"></i> Suggested Friends
      </h5>

      <p
        class="flex h-5.5 w-5.5 items-center justify-center rounded-full bg-gray-200 font-bold text-gray-600"
      >
        {{ suggestedFriends.length }}
      </p>
    </div>
    <div class="mb-3">
      <label for="search" class="text-heading sr-only mb-2.5 block text-sm font-medium"
        >Search</label
      >
      <div class="relative">
        <div class="pointer-events-none absolute inset-y-0 inset-s-0 flex items-center ps-3">
          <svg
            class="text-body h-4 w-4"
            aria-hidden="true"
            xmlns="http://www.w3.org/2000/svg"
            width="24"
            height="24"
            fill="none"
            viewBox="0 0 24 24"
          >
            <path
              stroke="currentColor"
              stroke-linecap="round"
              stroke-width="2"
              d="m21 21-3.5-3.5M17 10a7 7 0 1 1-14 0 7 7 0 0 1 14 0Z"
            />
          </svg>
        </div>
        <input
          (input)="searchForSuggestedFriend()"
          [(ngModel)]="binding"
          name="search"
          type="search"
          id="searchForSuggestedFriend"
          class="bg-neutral-secondary-medium border-default-medium text-heading rounded-base focus:ring-brand focus:border-brand block w-full border p-3 ps-9 text-sm shadow-xs placeholder:text-gray-400"
          placeholder="Search by name or username..."
        />
      </div>
    </div>
  </div>

  <div class="flow-root">
    <ul role="list" class="grid grid-cols-1 gap-3">
      @if (isLoading) {
        @for (friend of [1, 2, 3]; track $index) {
          <app-skeletons-suggested-friend-card />
        }
      }
      @for (friend of suggestedFriends; track friend._id) {
        <li [class.border-b]="$last" class="rounded-xl border-2 border-gray-100 px-3 py-3">
          <app-suggested-friend-card
            [friend]="friend"
            (updateDataEvent)="updateFriends($event)"
            [isLoading]="isLoadingNewFriendsBtn"
          />
        </li>
      } @empty {
        <li class="py-3 text-gray-600">No users matched your search.</li>
      }
    </ul>
  </div>

  <a
    routerLink="/suggested"
    class="border-default hover:bg-neutral-tertiary-medium mt-2 block w-full cursor-pointer rounded-full border bg-gray-50 p-2 text-center text-[.875rem] font-bold text-gray-600 shadow-xs transition md:max-w-sm"
  >
    View more
  </a>
</aside>
