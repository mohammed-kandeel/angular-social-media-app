<div
  [class.cursor-progress]="isLoading"
  class="group relative h-50 w-full overflow-hidden rounded-t-2xl bg-linear-to-r from-[#1e3a5f] via-[#2d5a8f] to-[#3a8fbf]"
>
  @if (userData.cover) {
    <img [src]="userData.cover" alt="user cover" class="h-50 w-full object-cover" />

    @if (isLoading) {
      <div class="absolute top-3 right-3 cursor-progress bg-gray-50/70 px-3 py-2 rounded-2xl">
        updating <i class="fa-solid fa-spinner fa-spin ms-1"></i>
      </div>
    } @else {
      <div
        class="absolute top-3 right-3 flex items-center gap-2 opacity-0 transition duration-400 group-hover:opacity-100"
      >
        <button
          (click)="onViewImg()"
          class="flex items-center gap-2 rounded-xl bg-gray-800/70 px-3 py-2 text-xs font-semibold text-white backdrop-blur-sm transition hover:bg-gray-800/90"
        >
          <i class="fa-solid fa-up-right-and-down-left-from-center text-2xs"></i>
          View cover
        </button>
        @if (userData._id === user._id) {
          <label
            for="changeCover"
            class="flex items-center gap-2 rounded-xl bg-gray-800/70 px-3 py-2 text-xs font-semibold text-white backdrop-blur-sm transition hover:bg-gray-800/90"
          >
            <input (change)="onFileSelected($event)" type="file" id="changeCover" class="hidden" />
            <i class="fa-regular fa-image"></i>
            Change cover
          </label>
          <button
            (click)="removeCover()"
            class="flex items-center gap-2 rounded-xl bg-gray-800/70 px-3 py-2 text-xs font-semibold text-white backdrop-blur-sm transition hover:bg-gray-800/90"
          >
            <i class="fa-regular fa-trash-can"></i>
            Remove
          </button>
        }
      </div>
    }

    @if (isViewImg) {
      @defer (when isViewImg) {
        <app-view-img-post [img]="userData.cover" (closeImag)="onCloseImg($event)" />
      }
    }
  } @else if (userData._id === user._id) {
    @if (isLoading) {
      <div
        class="absolute top-3 right-3 cursor-progress bg-black/50 text-white px-3 py-2 rounded-2xl"
      >
        updating <i class="fa-solid fa-spinner fa-spin ms-1"></i>
      </div>
    } @else {
      <label
        for="addCover"
        class="absolute top-3 right-3 flex items-center gap-2 rounded-xl bg-gray-800/70 px-3 py-2 text-xs font-semibold text-white backdrop-blur-sm transition duration-400 group-hover:opacity-100 hover:bg-gray-800/90"
      >
        <input (change)="onFileSelected($event)" type="file" id="addCover" class="hidden" />
        <i class="fa-regular fa-image"></i>
        Add cover
      </label>
    }
  }
</div>

@if (isModalOpen) {
  @defer (when isModalOpen) {
    <app-privacy-modal (oncancel)="closeModal()" (onSave)="onSaveCover($event)" />
  }
}
