<section
  class="flex items-center justify-between rounded-2xl border border-gray-200 bg-white px-4 py-3"
>
  <!-- Tabs -->
  <div class="flex items-center justify-between gap-0.5 rounded-lg bg-gray-100 px-1.5 py-2">
    <!-- text-blue-600 bg-white shadow-sm-->
    <!-- text-gray-500  hover:text-gray-700   hover:bg-white/50-->
    <button
      (click)="onFilterBtn('posts')"
      [class]="`${btnFilter === 'posts' ? 'bg-white text-blue-600 shadow-sm' : 'text-gray-500 hover:bg-white/50 hover:text-gray-700'}`"
      class="flex items-center gap-2 rounded-xl px-5 py-2.5 text-sm font-bold transition"
    >
      <i class="fa-regular fa-file-lines"></i>
      My Posts
    </button>

    <button
      (click)="onFilterBtn('bookmark')"
      [class]="`${btnFilter === 'bookmark' ? 'bg-white text-blue-600 shadow-sm' : 'text-gray-500 hover:bg-white/50 hover:text-gray-700'}`"
      class="flex items-center gap-2 rounded-xl px-5 py-2.5 text-sm font-bold transition"
    >
      <i class="fa-regular fa-bookmark"></i>
      Saved
    </button>
  </div>

  <!-- Count -->
  <span class="text-sm font-bold text-blue-500"> {{ postsNumber }} </span>
</section>
