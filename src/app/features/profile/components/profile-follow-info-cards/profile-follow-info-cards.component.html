@for (card of cards; track card.title) {
  <app-card
    [cardClass]="'bg-white border border-gray-200 hover:shadow-md transition-shadow rounded-2xl px-5 py-3 text-center min-w-22.5'"
    [titleClass]="'text-2xs font-bold text-gray-400 uppercase tracking-widest mb-1'"
    [contentClass]="'text-2xl font-black text-gray-900'"
    [title]="card.title"
    [content]="card.content"
  />
}
