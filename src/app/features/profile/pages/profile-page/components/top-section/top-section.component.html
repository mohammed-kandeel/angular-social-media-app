<section class="mb-4 rounded-3xl bg-white shadow-xl">
  <!-- cover  -->
  <app-profile-cover [userData]="userData" />

  <div class="relative -mt-18 md:px-8 pb-6">
    <div class="w-full space-y-5 overflow-hidden rounded-3xl bg-white/90 p-6">
      <div class="flex flex-col items-start gap-6 md:flex-row md:items-center">
        <!-- Avatar -->
        <app-profile-user-avatar [userData]="userData" />

        <!-- Name_UserName -->
        <app-profile-name-user-name [hostClass]="'flex-1 min-w-0'" [userData]="userData" />

        <!-- follow info cards -->
        <app-profile-follow-info-cards
          [hostClass]="'flex gap-3  flex-wrap shrink-0'"
          [userData]="userData"
        />
      </div>

      <div class="grid grid-cols-1 gap-4 md:grid-cols-2">
        <!-- About -->
        <app-profile-about-card [userData]="userData" />

        <!-- Right Stats -->
        <app-profile-posts-info-cards
          [hostClass]="'flex flex-col gap-3'"
          [userData]="userData"
          [postsNumber]="postsNumber"
        />
      </div>
    </div>
  </div>
</section>
