<div class="animate-pulse overflow-hidden rounded-3xl bg-white shadow-2xl">
  <!-- Cover Skeleton -->
  <div class="h-36 w-full bg-gray-200"></div>

  <!-- Content -->
  <div class="space-y-5 p-6">
    <!-- Top Section -->
    <div class="flex flex-col items-start gap-6 sm:flex-row sm:items-center">
      <!-- Avatar Skeleton -->
      <div class="-mt-16 shrink-0">
        <div class="h-24 w-24 rounded-full bg-gray-300 ring-4 ring-white"></div>
      </div>

      <!-- Name & Badge Skeleton -->
      <div class="flex-1 space-y-2">
        <div class="h-7 w-48 rounded-full bg-gray-200"></div>
        <div class="h-4 w-28 rounded-full bg-gray-200"></div>
      </div>

      <!-- Stats Skeleton -->
      <div class="flex shrink-0 gap-3">
        @for (item of [1, 2, 3]; track item) {
          <div
            class="min-w-22.5 space-y-2 rounded-2xl border border-gray-200 bg-gray-100 px-5 py-3 text-center"
          >
            <div class="mx-auto h-2.5 w-16 rounded-full bg-gray-200"></div>
            <div class="mx-auto h-6 w-8 rounded-full bg-gray-200"></div>
          </div>
        }
      </div>
    </div>

    <!-- Bottom Section -->
    <div class="grid grid-cols-1 gap-4 sm:grid-cols-2">
      <!-- About Skeleton -->
      <div class="space-y-4 rounded-2xl border border-gray-200 bg-gray-50 p-5">
        <div class="h-4 w-16 rounded-full bg-gray-200"></div>
        <div class="space-y-3">
          <div class="flex items-center gap-2">
            <div class="h-4 w-4 shrink-0 rounded-full bg-gray-200"></div>
            <div class="h-3 w-44 rounded-full bg-gray-200"></div>
          </div>
          <div class="flex items-center gap-2">
            <div class="h-4 w-4 shrink-0 rounded-full bg-gray-200"></div>
            <div class="h-3 w-32 rounded-full bg-gray-200"></div>
          </div>
        </div>
      </div>

      <!-- Right Stats Skeleton -->
      <div class="flex flex-col gap-3">
        @for (item of [1, 2]; track item) {
          <div class="space-y-2 rounded-2xl border border-gray-200 bg-gray-50 px-5 py-4">
            <div class="h-2.5 w-20 rounded-full bg-gray-200"></div>
            <div class="h-7 w-10 rounded-full bg-gray-200"></div>
          </div>
        }
      </div>
    </div>
  </div>
</div>
